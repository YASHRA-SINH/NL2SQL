<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanna NL2SQL Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <!-- Highlight.js for SQL highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>HealthQuery AI</h2>
                <p>Natural Language to SQL</p>
            </div>
            
            <div class="suggested-questions">
                <h3>Suggested Queries</h3>
                <ul id="suggestions-list">
                    <!-- Populated by JS -->
                </ul>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <h1>Data Assistant</h1>
                <div class="status-indicator">
                    <span class="dot online"></span>
                    <span class="status-text">Connected</span>
                </div>
            </header>

            <div class="chat-container" id="chat-container">
                <div class="message assistant welcome">
                    <div class="message-content">
                        Hello! I'm your AI data assistant. Ask me anything about the clinic's patients, doctors, appointments, or financials.
                    </div>
                </div>
                <!-- Chat messages will be appended here -->
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <input type="text" id="query-input" placeholder="Ask a question about your data..." autocomplete="off">
                    <button type="submit" id="send-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Template for Table rendering -->
    <template id="table-template">
        <div class="data-table-wrapper">
            <table class="data-table">
                <thead>
                    <tr></tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </template>

    <script src="/static/script.js"></script>
</body>
</html>
